<div class="flex flex-col lg:flex-row gap-2 max-h-85">
	<lv-chunk-form-card class="lg:min-w-md min-h-85" [missions]="missions" [value]="chunk"></lv-chunk-form-card>
	<div class="flex flex-col w-full overflow-y-auto">
		@for (group of selectedChunks | keyvalue; track group.key) {
		<h3 class="bg-on-primary text-primary p-1">
			{{ group.key }}
		</h3>
		<!-- <mat-divider class=""></mat-divider> -->
		<div class="flex flex-col mb-4">
			@for (c of group.value; track c._id) {
			<div class="flex flex-col gap-1 mx-4">
				<div class="flex items-center gap-2">
					<span>{{ c.count }}</span>
					<mat-slider class="flex-1" min="1" max="18" step="1" discrete [disabled]="c.pending">
						<input matSliderThumb [value]="c.count" (valueChange)="doUpdateCount(c, $event)">
					</mat-slider>
					<div class="w-8">
						<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
							stroke="currentColor" class="size-6 text-tertiary cursor-pointer" (click)="doDelete(c)"
							*lvLoading="c.pending; color:'danger'; diameter: 24; classes: ['']">
							<path stroke-linecap="round" stroke-linejoin="round"
								d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
						</svg>
					</div>
				</div>
				<div class="flex items-center mx-2">
					<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
						stroke="currentColor" class="size-6">
						<path stroke-linecap="round" stroke-linejoin="round"
							d="m16.49 12 3.75 3.75m0 0-3.75 3.75m3.75-3.75H3.74V4.499" />
					</svg>
					<span class="inline-block relative top-1 ms-1">{{ c.desc }}</span>
				</div>
			</div>
			}
		</div>
		}
	</div>
</div>
<mat-card>
	<mat-card-content class="flex! flex-col lg:flex-row gap-2">
		<lv-chunk-calendar [chunks]="chunks" [selected]="selected?.date || null" [(startAt)]="lastMonth"
			(selectedChange)="updateSelected($event)"></lv-chunk-calendar>
		<lv-chunk-calendar [chunks]="chunks" [selected]="selected?.date || null"
			(selectedChange)="updateSelected($event)"></lv-chunk-calendar>
	</mat-card-content>
</mat-card>
