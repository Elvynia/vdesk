<mat-card class="w-full h-full">
	<mat-card-content class="flex! flex-col h-full">
		<lv-chunk-form class="flex-1" [value]="value" [group]="group" [missions]="missions"
			*lvLoading="missions.length === 0; color: 'accent'; diameter: 128"></lv-chunk-form>
	</mat-card-content>
	<mat-card-actions class="flex">
		<button mat-raised-button color="accent" class="grow" tabindex="3"
			[disabled]="pending || group.invalid || group.pending" (click)="submit()">Save chunk</button>
	</mat-card-actions>
</mat-card>
